<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- column headers -->
  <text x="190" y="40" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.5" fill="#64748b">DATA SOURCE</text>
  <text x="426" y="40" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.5" fill="#64748b">PIPELINE</text>
  <text x="662" y="40" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.5" fill="#64748b">FRONT END</text>

  <!-- row labels -->
  <text x="46" y="131" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">All jargon</text>
  <text x="46" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">On a napkin</text>

  <!-- ROW 1: jargon -->
  <g>
    <rect x="92"  y="92" width="196" height="78" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="328" y="92" width="196" height="78" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="564" y="92" width="196" height="78" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="190" y="126" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">NoSQL store +</text>
    <text x="190" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">polling API</text>
    <text x="426" y="137" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">ETL pipeline</text>
    <text x="662" y="137" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">React SPA</text>
    <line x1="290" y1="131" x2="326" y2="131" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="526" y1="131" x2="562" y2="131" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- vertical connectors: same box, two words -->
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 4">
    <line x1="190" y1="172" x2="190" y2="194"/>
    <line x1="426" y1="172" x2="426" y2="194"/>
    <line x1="662" y1="172" x2="662" y2="194"/>
  </g>

  <!-- ROW 2: napkin -->
  <g>
    <rect x="92"  y="196" width="196" height="78" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <rect x="328" y="196" width="196" height="78" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <rect x="564" y="196" width="196" height="78" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <text x="190" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Is each spot</text>
    <text x="190" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">free?</text>
    <text x="426" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Keep it fresh,</text>
    <text x="426" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">send it over</text>
    <text x="662" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Show it on</text>
    <text x="662" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">a screen</text>
    <line x1="290" y1="235" x2="326" y2="235" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="526" y1="235" x2="562" y2="235" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- caption -->
  <text x="400" y="330" text-anchor="middle" font-size="14" fill="#475569">Same three boxes, two vocabularies. One needs a CS degree to read.</text>
  <text x="400" y="352" text-anchor="middle" font-size="14" fill="#475569">The other you'd draw on a napkin. <tspan font-weight="700" fill="#0f172a">Both are correct.</tspan></text>
</svg>
